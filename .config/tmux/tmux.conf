# Prefix
unbind C-b
set -g prefix C-y
bind C-y send-prefix

bind r source-file ~/.config/tmux/tmux.conf 

# Start index of window/pane with 1, because we're humans, not computers
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Enable mouse control (clickable windows, panes, resizable panes)
set -g mouse on

setw -g mode-keys vi

# --- KEYBINDINGS ---

# Pane navigation (prefix + hjkl)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Windows and Splits (prefix + v = vertical, prefix + s = horizontal)
bind c new-window -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"

# Rebinding to skip confirmation
bind x kill-pane

# Pass Shift-Enter through to inner applications (e.g. Neovim, OpenCode, pi)
# extended-keys makes tmux recognise CSI u sequences from the outer terminal
set -s extended-keys on
# Advertise extended-key (CSI u) support to applications running inside tmux
set -as terminal-features "*:extkeys"
# Explicitly forward Shift-Enter as the CSI u escape sequence to the active pane
bind -n S-Enter send-keys "\e[13;2u"

# --- PLUGINS ---
if "test ! -d ~/.config/tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm && ~/.config/tmux/plugins/tpm/bin/install_plugins'"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'catppuccin/tmux#v2.1.3'

# Catppuccin theme
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_text " #W:[#{b:pane_current_path}]"
set -g @catppuccin_window_current_text " #W #{?window_zoomed_flag, (),}"
set -g status-left-length 100
set -g status-left "#{E:@catppuccin_status_session}"
set -g status-right-length 0
set -g status-right ""

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'
