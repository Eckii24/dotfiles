# Herdr configuration
# Reference: https://herdr.dev/docs/configuration/

onboarding = false

[theme]
name = "catppuccin"

[keys]
prefix = "ctrl+y"

settings = "prefix+,"
focus_agent = "prefix+alt+1..9"

# Workspace
new_workspace = "prefix+n"
rename_workspace = "prefix+shift+n"
switch_workspace = "prefix+ctrl+1..9"

# Tabs + panes
rename_tab = "prefix+shift+c"
split_horizontal = "prefix+s"  

[ui]
confirm_close = false
pane_gaps = false
prompt_new_tab_name = false

[ui.toast]
delivery = "terminal"

[ui.sound]
enabled = false

[experimental]
kitty_graphics = true
